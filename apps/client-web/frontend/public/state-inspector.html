<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voice Chat State Inspector</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #242836;
    --border: #2e3345;
    --text: #e1e4ed;
    --text-dim: #8b90a5;
    --accent: #6c8cff;
    --accent-dim: #3d5199;
    --green: #4ade80;
    --green-dim: #166534;
    --yellow: #facc15;
    --yellow-dim: #713f12;
    --red: #f87171;
    --red-dim: #7f1d1d;
    --orange: #fb923c;
    --purple: #a78bfa;
    --cyan: #22d3ee;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    min-height: 100vh;
  }
  .container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 20px;
  }
  h1 {
    font-size: 1.5rem;
    margin-bottom: 4px;
    color: var(--accent);
  }
  .subtitle {
    color: var(--text-dim);
    font-size: 0.85rem;
    margin-bottom: 20px;
  }

  /* Layout */
  .main-grid {
    display: grid;
    grid-template-columns: 320px 1fr;
    gap: 16px;
  }
  @media (max-width: 900px) {
    .main-grid { grid-template-columns: 1fr; }
  }

  /* Scenario list */
  .scenario-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }
  .scenario-panel h2 {
    font-size: 0.9rem;
    padding: 12px 16px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    color: var(--text-dim);
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .scenario-group-title {
    font-size: 0.75rem;
    padding: 8px 16px 4px;
    color: var(--accent);
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    background: var(--bg);
  }
  .scenario-item {
    padding: 10px 16px;
    cursor: pointer;
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
    font-size: 0.85rem;
  }
  .scenario-item:hover { background: var(--surface2); }
  .scenario-item.active {
    background: var(--accent-dim);
    border-left: 3px solid var(--accent);
  }
  .scenario-item .scenario-label { font-weight: 500; }
  .scenario-item .scenario-desc {
    font-size: 0.75rem;
    color: var(--text-dim);
    margin-top: 2px;
  }
  .scenario-list {
    max-height: calc(100vh - 160px);
    overflow-y: auto;
  }

  /* Right panel */
  .detail-panel {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  /* State dashboard */
  .state-dashboard {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 10px;
  }
  .state-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px;
    text-align: center;
    transition: border-color 0.3s, box-shadow 0.3s;
  }
  .state-card.highlight {
    border-color: var(--accent);
    box-shadow: 0 0 12px rgba(108, 140, 255, 0.15);
  }
  .state-card .card-label {
    font-size: 0.7rem;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 6px;
  }
  .state-card .card-value {
    font-size: 0.95rem;
    font-weight: 600;
    min-height: 1.4em;
  }
  .state-card .card-value.idle { color: var(--text-dim); }
  .state-card .card-value.recording { color: var(--red); }
  .state-card .card-value.processing { color: var(--yellow); }
  .state-card .card-value.speaking { color: var(--green); }
  .state-card .card-value.error { color: var(--red); }
  .state-card .card-value.info { color: var(--cyan); }

  /* Timeline */
  .timeline-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }
  .timeline-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
  }
  .timeline-header h3 {
    font-size: 0.85rem;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .timeline-controls {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .timeline-controls button {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 4px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.8rem;
    transition: all 0.15s;
  }
  .timeline-controls button:hover { background: var(--accent-dim); border-color: var(--accent); }
  .timeline-controls button:disabled { opacity: 0.3; cursor: not-allowed; }
  .step-counter {
    font-size: 0.8rem;
    color: var(--text-dim);
    min-width: 60px;
    text-align: center;
  }
  .timeline-body {
    padding: 16px;
  }

  /* Step card */
  .step-card {
    padding: 12px 16px;
    border-left: 3px solid var(--border);
    margin-bottom: 12px;
    transition: all 0.3s;
    border-radius: 0 8px 8px 0;
    background: transparent;
  }
  .step-card.current {
    border-left-color: var(--accent);
    background: rgba(108, 140, 255, 0.06);
  }
  .step-card.done {
    border-left-color: var(--green-dim);
    opacity: 0.6;
  }
  .step-card.future {
    opacity: 0.35;
  }
  .step-trigger {
    font-size: 0.75rem;
    color: var(--accent);
    font-weight: 500;
    margin-bottom: 4px;
  }
  .step-description {
    font-size: 0.85rem;
    margin-bottom: 8px;
  }
  .step-states {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .step-state-tag {
    font-size: 0.7rem;
    padding: 2px 8px;
    border-radius: 4px;
    font-family: 'SF Mono', 'Fira Code', monospace;
  }
  .step-state-tag.idle { background: var(--surface2); color: var(--text-dim); }
  .step-state-tag.recording { background: var(--red-dim); color: var(--red); }
  .step-state-tag.processing { background: var(--yellow-dim); color: var(--yellow); }
  .step-state-tag.speaking { background: var(--green-dim); color: var(--green); }
  .step-state-tag.error { background: var(--red-dim); color: var(--red); }
  .step-state-tag.info { background: rgba(34,211,238,0.1); color: var(--cyan); }

  /* Mic simulation */
  .mic-sim {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
  }
  .mic-orb {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2rem;
    transition: all 0.4s;
    position: relative;
  }
  .mic-orb.idle {
    background: var(--surface2);
    box-shadow: 0 0 0 0 transparent;
  }
  .mic-orb.recording {
    background: var(--red-dim);
    box-shadow: 0 0 20px rgba(248, 113, 113, 0.3);
    animation: pulse-red 1.5s ease-in-out infinite;
  }
  .mic-orb.processing {
    background: var(--yellow-dim);
    box-shadow: 0 0 20px rgba(250, 204, 21, 0.2);
    animation: pulse-yellow 2s ease-in-out infinite;
  }
  .mic-orb.speaking {
    background: var(--green-dim);
    box-shadow: 0 0 20px rgba(74, 222, 128, 0.3);
    animation: pulse-green 1s ease-in-out infinite;
  }
  @keyframes pulse-red {
    0%, 100% { box-shadow: 0 0 10px rgba(248,113,113,0.2); }
    50% { box-shadow: 0 0 25px rgba(248,113,113,0.4); }
  }
  @keyframes pulse-yellow {
    0%, 100% { box-shadow: 0 0 10px rgba(250,204,21,0.15); }
    50% { box-shadow: 0 0 20px rgba(250,204,21,0.3); }
  }
  @keyframes pulse-green {
    0%, 100% { box-shadow: 0 0 10px rgba(74,222,128,0.2); }
    50% { box-shadow: 0 0 25px rgba(74,222,128,0.4); }
  }
  .mic-status-text {
    margin-left: 20px;
    text-align: left;
  }
  .mic-status-label {
    font-size: 1.1rem;
    font-weight: 600;
  }
  .mic-status-sub {
    font-size: 0.8rem;
    color: var(--text-dim);
    margin-top: 2px;
  }

  /* Playback bar */
  .playback-bar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
  }
  .playback-bar button {
    background: var(--accent);
    border: none;
    color: #fff;
    padding: 6px 16px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.85rem;
    font-weight: 500;
    transition: all 0.15s;
  }
  .playback-bar button:hover { filter: brightness(1.15); }
  .playback-bar .auto-label {
    font-size: 0.8rem;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .playback-bar .speed-select {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 4px 8px;
    border-radius: 4px;
    font-size: 0.8rem;
  }

  /* Check result */
  .check-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
  }
  .check-section h3 {
    font-size: 0.85rem;
    color: var(--text-dim);
    margin-bottom: 8px;
  }
  .check-btns {
    display: flex;
    gap: 8px;
  }
  .check-btn {
    padding: 6px 16px;
    border-radius: 6px;
    border: 1px solid var(--border);
    cursor: pointer;
    font-size: 0.85rem;
    transition: all 0.15s;
  }
  .check-btn.pass {
    background: var(--green-dim);
    color: var(--green);
    border-color: var(--green-dim);
  }
  .check-btn.pass:hover { filter: brightness(1.2); }
  .check-btn.fail {
    background: var(--red-dim);
    color: var(--red);
    border-color: var(--red-dim);
  }
  .check-btn.fail:hover { filter: brightness(1.2); }
  .check-btn.skip {
    background: var(--surface2);
    color: var(--text-dim);
  }
  .check-btn.skip:hover { background: var(--border); }
  .check-result-badge {
    display: inline-block;
    font-size: 0.7rem;
    padding: 1px 6px;
    border-radius: 3px;
    margin-left: 8px;
    font-weight: 600;
    vertical-align: middle;
  }
  .check-result-badge.pass { background: var(--green-dim); color: var(--green); }
  .check-result-badge.fail { background: var(--red-dim); color: var(--red); }
  .check-result-badge.skip { background: var(--surface2); color: var(--text-dim); }

  /* Summary bar */
  .summary-bar {
    display: flex;
    gap: 16px;
    padding: 12px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    font-size: 0.85rem;
    align-items: center;
  }
  .summary-stat {
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .summary-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    display: inline-block;
  }
  .summary-dot.pass { background: var(--green); }
  .summary-dot.fail { background: var(--red); }
  .summary-dot.skip { background: var(--text-dim); }
  .summary-dot.pending { background: var(--border); }

  .empty-state {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 300px;
    color: var(--text-dim);
    font-size: 0.9rem;
  }

  /* Notes */
  .notes-area {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    padding: 8px 12px;
    font-size: 0.8rem;
    resize: vertical;
    min-height: 40px;
    margin-top: 8px;
    font-family: inherit;
  }
  .notes-area::placeholder { color: var(--text-dim); }
  .notes-area:focus { outline: none; border-color: var(--accent); }
</style>
</head>
<body>
<div class="container">
  <h1>Voice Chat State Inspector</h1>
  <div class="subtitle">交互式状态流程检查工具 — 逐一验证每个场景的状态变化是否符合预期</div>

  <!-- Summary bar -->
  <div class="summary-bar" id="summaryBar">
    <span style="color:var(--text-dim)">进度:</span>
    <span class="summary-stat"><span class="summary-dot pass"></span> <span id="passCount">0</span> 通过</span>
    <span class="summary-stat"><span class="summary-dot fail"></span> <span id="failCount">0</span> 异常</span>
    <span class="summary-stat"><span class="summary-dot skip"></span> <span id="skipCount">0</span> 跳过</span>
    <span class="summary-stat"><span class="summary-dot pending"></span> <span id="pendingCount">0</span> 待检</span>
  </div>

  <div class="main-grid" style="margin-top:16px">
    <!-- Left: Scenario list -->
    <div class="scenario-panel">
      <h2>场景列表</h2>
      <div class="scenario-list" id="scenarioList"></div>
    </div>

    <!-- Right: Detail -->
    <div class="detail-panel" id="detailPanel">
      <div class="empty-state">← 请从左侧选择一个场景开始检查</div>
    </div>
  </div>
</div>

<script>
// ========== SCENARIO DATA ==========
const SCENARIOS = [
  // ── PTT Happy Path ──
  {
    group: 'PTT 模式 (按下说话)',
    id: 'ptt-happy',
    label: 'PTT 完整流程 (正常)',
    desc: '用户点击→录音→STT→Agent处理→生成回复→TTS朗读→回到空闲',
    steps: [
      {
        trigger: '初始状态',
        desc: '页面加载后，PTT 模式空闲状态',
        appState: 'idle', micState: '', statusText: '点击说话', audioState: 'idle',
        bodyClass: '', micClass: '',
      },
      {
        trigger: '用户点击麦克风按钮',
        desc: 'startRecording() 被调用，获取麦克风权限，开始录音',
        appState: 'recording', micState: 'recording', statusText: '🔴 正在听...', audioState: 'idle',
        bodyClass: 'state-recording', micClass: 'recording',
        events: ['ui:voice-feedback → start', 'ui:mic-state → recording', 'ui:cancel-buttons → true'],
      },
      {
        trigger: '用户再次点击麦克风 (停止录音)',
        desc: 'stopRecording()，mediaRecorder.stop()，触发 onstop 回调',
        appState: 'recording', micState: 'recording', statusText: '🔴 正在听...', audioState: 'idle',
        bodyClass: 'state-recording', micClass: 'recording',
        events: ['ui:voice-feedback → stop', 'ui:voice-ripple → 0'],
        note: 'onstop 是异步的，录音状态在回调中才改变',
      },
      {
        trigger: 'onstop 回调 — 开始 STT 识别',
        desc: 'browserSTT.transcribe(blob)，或发送音频到服务器',
        appState: 'processing', micState: 'processing', statusText: '识别中...', audioState: 'idle',
        bodyClass: 'state-processing', micClass: 'processing',
        events: ['ui:mic-state → processing', 'ui:status-text → 识别中...'],
      },
      {
        trigger: 'STT 完成，文字发送到服务器',
        desc: 'outbox.enqueue({type:"text", text, botId}), 等待服务器处理',
        appState: 'processing', micState: 'processing', statusText: '处理中', audioState: 'idle',
        bodyClass: 'state-processing', micClass: 'processing',
        events: ['chat:add-user-msg'],
      },
      {
        trigger: 'WS: transcript 消息',
        desc: '服务器确认收到用户输入，显示转录文本',
        appState: 'processing', micState: 'processing', statusText: '处理中', audioState: 'idle',
        bodyClass: 'state-processing', micClass: 'processing',
        events: ['setBotMicState → processing', 'setBotStatus → 处理中'],
      },
      {
        trigger: 'WS: intermediate_step 消息',
        desc: 'Agent 正在思考，显示 💭 中间步骤',
        appState: 'processing', micState: 'processing', statusText: '处理中', audioState: 'idle',
        bodyClass: 'state-processing', micClass: 'processing',
        events: ['addBotMsg → 💭 intermediate'],
      },
      {
        trigger: 'WS: response_chunk 消息 (流式)',
        desc: '文本回复开始流式到达',
        appState: 'processing', micState: 'processing', statusText: '生成中', audioState: 'idle',
        bodyClass: 'state-processing', micClass: 'processing',
        events: ['appendStreamChunk', 'setBotStatus → 生成中'],
      },
      {
        trigger: 'WS: audio_chunk 消息',
        desc: 'TTS 音频开始流式到达，准备播放',
        appState: 'speaking', micState: 'speaking', statusText: '朗读中', audioState: 'playing',
        bodyClass: 'state-speaking', micClass: 'speaking',
        events: ['setBotMicState → speaking', 'autoReadEnqueue'],
      },
      {
        trigger: 'WS: response_complete 消息',
        desc: '文本生成完成。音频还在播放，所以不回到空闲',
        appState: 'speaking', micState: 'speaking', statusText: '朗读中', audioState: 'playing',
        bodyClass: 'state-speaking', micClass: 'speaking',
        events: ['st.responseDone = true', '设置 15s 安全超时'],
        note: '因为 audioDone=false，不会 resetBotToIdle',
      },
      {
        trigger: 'WS: audio_complete 消息',
        desc: 'TTS 全部音频发送完成',
        appState: 'speaking', micState: '', statusText: '朗读中', audioState: 'playing',
        bodyClass: 'state-speaking', micClass: 'speaking',
        events: ['completeStreamAudio', 'resetBotToIdle', 'dispatcher:audio-complete'],
        note: 'micState 重置，但 audioPlayer 可能还在播放队列中的音频',
      },
      {
        trigger: 'audio:state → phase: end',
        desc: 'audioPlayer 真正播放完最后一段音频',
        appState: 'idle', micState: '', statusText: '点击说话', audioState: 'idle',
        bodyClass: '', micClass: '',
        events: ['setMicRecordingState → ""', 'setStatus → 点击说话', 'scheduleUnreadAnnouncement'],
      },
    ],
  },

  // ── PTT Recording Too Short ──
  {
    group: 'PTT 模式 (按下说话)',
    id: 'ptt-too-short',
    label: 'PTT 录音太短',
    desc: '用户点击后立即松开，录音时间不足',
    steps: [
      {
        trigger: '初始状态',
        desc: 'PTT 空闲',
        appState: 'idle', micState: '', statusText: '点击说话', audioState: 'idle',
        bodyClass: '', micClass: '',
      },
      {
        trigger: '用户快速点击+松开',
        desc: 'startRecording → 很快 stopRecording',
        appState: 'recording', micState: 'recording', statusText: '🔴 正在听...', audioState: 'idle',
        bodyClass: 'state-recording', micClass: 'recording',
      },
      {
        trigger: 'onstop — buildRecordingBlob 返回 null',
        desc: '音频太短（不够数据），直接回到空闲',
        appState: 'idle', micState: '', statusText: '录音太短', audioState: 'idle',
        bodyClass: '', micClass: '',
        events: ['ui:status-text → 录音太短', 'ui:mic-state → ""'],
        note: '状态栏短暂显示"录音太短"后恢复默认',
      },
    ],
  },

  // ── PTT Cancel Recording ──
  {
    group: 'PTT 模式 (按下说话)',
    id: 'ptt-cancel',
    label: 'PTT 取消录音',
    desc: '用户录音中按取消按钮',
    steps: [
      {
        trigger: '初始状态',
        desc: 'PTT 空闲',
        appState: 'idle', micState: '', statusText: '点击说话', audioState: 'idle',
        bodyClass: '', micClass: '',
      },
      {
        trigger: '用户点击麦克风开始录音',
        desc: '进入录音状态',
        appState: 'recording', micState: 'recording', statusText: '🔴 正在听...', audioState: 'idle',
        bodyClass: 'state-recording', micClass: 'recording',
      },
      {
        trigger: '用户点击取消按钮',
        desc: 'cancelRecording()，设置 recordingCancelled=true，然后 stopRecording()',
        appState: 'idle', micState: '', statusText: '已取消录音', audioState: 'idle',
        bodyClass: '', micClass: '',
        events: ['ui:voice-feedback → cancel', 'ui:cancel-buttons → false', 'ui:status-text → 已取消录音'],
        note: 'onstop 回调检测到 cancelled=true，直接 return，不处理音频',
      },
    ],
  },

  // ── PTT STT Not Heard ──
  {
    group: 'PTT 模式 (按下说话)',
    id: 'ptt-not-heard',
    label: 'PTT 语音未识别',
    desc: '录音正常但 STT 无法识别内容',
    steps: [
      {
        trigger: '初始状态',
        desc: 'PTT 空闲',
        appState: 'idle', micState: '', statusText: '点击说话', audioState: 'idle',
        bodyClass: '', micClass: '',
      },
      {

        events: ['autoReadEnqueue → _deferredReads.push()'],
        note: '不立即播放，避免录到自己的朗读声',
      },
      {
        trigger: '录音结束',
        desc: 'flushDeferredReads() 将暂存的音频加入播放队列',
        appState: 'processing', micState: 'processing', statusText: '处理中', audioState: 'playing',
        bodyClass: 'state-processing', micClass: 'processing',
        events: ['flushDeferredReads → audioPlayer.enqueue'],
      },
    ],
  },

  // ── Unread Announcement ──
  {
    group: '自动朗读',
    id: 'unread-announce',
    label: '未读消息播报',
    desc: '全局空闲时自动播报其他 Bot 的未读消息计数',
    steps: [
      {
        trigger: '全局空闲 + 有其他 Bot 未读消息',
        desc: 'scheduleUnreadAnnouncement → 4s 延迟',
        appState: 'idle', micState: '', statusText: '点击说话', audioState: 'idle',
        bodyClass: '', micClass: '',
        events: ['scheduleUnreadAnnouncement'],
      },
      {
        trigger: '4 秒后检查仍然空闲',
        desc: '生成 TTS 播报: "XXX有3条未读消息"',
        appState: 'idle', micState: '', statusText: '点击说话', audioState: 'playing',
        bodyClass: '', micClass: '',
        events: ['_requestAnnounceTTS', 'audioPlayer.enqueue'],
        note: '如果生成文本与上次相同则不重复播报',
      },
    ],
  },
];

// ========== STATE ==========
let currentScenarioId = null;
let currentStep = 0;
let checkResults = {}; // scenarioId → 'pass' | 'fail' | 'skip'
let scenarioNotes = {}; // scenarioId → string

// Load from sessionStorage
try {
  checkResults = JSON.parse(sessionStorage.getItem('vc_check_results') || '{}');
  scenarioNotes = JSON.parse(sessionStorage.getItem('vc_scenario_notes') || '{}');
} catch (_e) {}

function saveState() {
  sessionStorage.setItem('vc_check_results', JSON.stringify(checkResults));
  sessionStorage.setItem('vc_scenario_notes', JSON.stringify(scenarioNotes));
}

// ========== RENDER ==========
function renderScenarioList() {
  const list = document.getElementById('scenarioList');
  let html = '';
  let lastGroup = '';
  for (const s of SCENARIOS) {
    if (s.group !== lastGroup) {
      html += `<div class="scenario-group-title">${s.group}</div>`;
      lastGroup = s.group;
    }
    const active = currentScenarioId === s.id ? ' active' : '';
    const badge = checkResults[s.id]
      ? `<span class="check-result-badge ${checkResults[s.id]}">${{pass:'通过',fail:'异常',skip:'跳过'}[checkResults[s.id]]}</span>`
      : '';
    html += `<div class="scenario-item${active}" onclick="selectScenario('${s.id}')">
      <div class="scenario-label">${s.label}${badge}</div>
      <div class="scenario-desc">${s.desc}</div>
    </div>`;
  }
  list.innerHTML = html;
  updateSummary();
}

function updateSummary() {
  const total = SCENARIOS.length;
  let pass = 0, fail = 0, skip = 0;
  for (const s of SCENARIOS) {
    if (checkResults[s.id] === 'pass') pass++;
    else if (checkResults[s.id] === 'fail') fail++;
    else if (checkResults[s.id] === 'skip') skip++;
  }
  document.getElementById('passCount').textContent = pass;
  document.getElementById('failCount').textContent = fail;
  document.getElementById('skipCount').textContent = skip;
  document.getElementById('pendingCount').textContent = total - pass - fail - skip;
}

function selectScenario(id) {
  currentScenarioId = id;
  currentStep = 0;
  renderScenarioList();
  renderDetail();
}

function renderDetail() {
  const panel = document.getElementById('detailPanel');
  if (!currentScenarioId) {
    panel.innerHTML = '<div class="empty-state">← 请从左侧选择一个场景开始检查</div>';
    return;
  }
  const scenario = SCENARIOS.find(s => s.id === currentScenarioId);
  if (!scenario) return;
  const step = scenario.steps[currentStep];

  let html = '';

  // Mic sim
  const orbClass = step.micClass || 'idle';
  const statusLabel = step.statusText || '—';
  const micEmoji = orbClass === 'recording' ? '🔴' : orbClass === 'speaking' ? '🔊' : orbClass === 'processing' ? '⏳' : '🎙️';
  html += `<div class="mic-sim">
    <div class="mic-orb ${orbClass}">${micEmoji}</div>
    <div class="mic-status-text">
      <div class="mic-status-label">${statusLabel}</div>
      <div class="mic-status-sub">body: ${step.bodyClass || '(无)'} · mic-btn: ${step.micClass || '(无)'}</div>
    </div>
  </div>`;

  // State dashboard
  html += `<div class="state-dashboard">
    <div class="state-card${step.appState !== 'idle' ? ' highlight' : ''}">
      <div class="card-label">App State</div>
      <div class="card-value ${step.appState}">${step.appState}</div>
    </div>
    <div class="state-card${step.micState ? ' highlight' : ''}">
      <div class="card-label">Bot Mic State</div>
      <div class="card-value ${step.micState || 'idle'}">${step.micState || '""(空)'}</div>
    </div>
    <div class="state-card">
      <div class="card-label">Status Text</div>
      <div class="card-value ${step.micState || 'idle'}">${step.statusText}</div>
    </div>
    <div class="state-card${step.audioState !== 'idle' ? ' highlight' : ''}">
      <div class="card-label">Audio Player</div>
      <div class="card-value ${step.audioState === 'playing' ? 'speaking' : 'idle'}">${step.audioState}</div>
    </div>
    <div class="state-card">
      <div class="card-label">body class</div>
      <div class="card-value ${step.bodyClass ? (step.bodyClass.includes('recording') ? 'recording' : step.bodyClass.includes('processing') ? 'processing' : 'speaking') : 'idle'}">${step.bodyClass || '(无)'}</div>
    </div>
    <div class="state-card">
      <div class="card-label">mic-btn class</div>
      <div class="card-value ${step.micClass || 'idle'}">${step.micClass || '(无)'}</div>
    </div>
  </div>`;

  // Playback bar
  html += `<div class="playback-bar">
    <button onclick="prevStep()" ${currentStep <= 0 ? 'disabled' : ''}>← 上一步</button>
    <span class="step-counter">${currentStep + 1} / ${scenario.steps.length}</span>
    <button onclick="nextStep()" ${currentStep >= scenario.steps.length - 1 ? 'disabled' : ''}>下一步 →</button>
    <button onclick="autoPlay()" id="autoPlayBtn">▶ 自动播放</button>
  </div>`;

  // Timeline
  html += `<div class="timeline-section">
    <div class="timeline-header">
      <h3>${scenario.label}</h3>
    </div>
    <div class="timeline-body">`;

  for (let i = 0; i < scenario.steps.length; i++) {
    const s = scenario.steps[i];
    const cls = i === currentStep ? 'current' : i < currentStep ? 'done' : 'future';
    html += `<div class="step-card ${cls}" onclick="goToStep(${i})" style="cursor:pointer">
      <div class="step-trigger">▸ ${s.trigger}</div>
      <div class="step-description">${s.desc}</div>
      <div class="step-states">
        <span class="step-state-tag ${s.appState}">app:${s.appState}</span>
        <span class="step-state-tag ${s.micState || 'idle'}">mic:${s.micState || '""'}</span>
        <span class="step-state-tag ${s.audioState === 'playing' ? 'speaking' : 'idle'}">audio:${s.audioState}</span>
      </div>`;
    if (s.events && i === currentStep) {
      html += `<div style="margin-top:6px; font-size:0.75rem; color:var(--purple)">`;
      for (const ev of s.events) {
        html += `<div>↳ ${ev}</div>`;
      }
      html += `</div>`;
    }
    if (s.note && i === currentStep) {
      html += `<div style="margin-top:4px; font-size:0.75rem; color:var(--orange); font-style:italic">⚠ ${s.note}</div>`;
    }
    html += `</div>`;
  }

  html += `</div></div>`;

  // Check section
  html += `<div class="check-section">
    <h3>验收判定</h3>
    <div style="font-size:0.85rem; color:var(--text-dim); margin-bottom:8px">
      检查完所有步骤后，标记此场景的状态变化是否符合你的预期：
    </div>
    <div class="check-btns">
      <button class="check-btn pass" onclick="checkScenario('pass')">✓ 符合预期</button>
      <button class="check-btn fail" onclick="checkScenario('fail')">✗ 有异常</button>
      <button class="check-btn skip" onclick="checkScenario('skip')">→ 跳过</button>
    </div>
    <textarea class="notes-area" placeholder="备注（可选）：记录发现的问题或想法..."
      oninput="saveNotes(this.value)">${scenarioNotes[currentScenarioId] || ''}</textarea>
  </div>`;

  panel.innerHTML = html;
}

function goToStep(i) {
  currentStep = i;
  renderDetail();
}

function prevStep() {
  if (currentStep > 0) { currentStep--; renderDetail(); }
}

function nextStep() {
  const scenario = SCENARIOS.find(s => s.id === currentScenarioId);
  if (scenario && currentStep < scenario.steps.length - 1) { currentStep++; renderDetail(); }
}

let _autoInterval = null;
function autoPlay() {
  const btn = document.getElementById('autoPlayBtn');
  if (_autoInterval) {
    clearInterval(_autoInterval);
    _autoInterval = null;
    btn.textContent = '▶ 自动播放';
    return;
  }
  btn.textContent = '⏸ 暂停';
  _autoInterval = setInterval(() => {
    const scenario = SCENARIOS.find(s => s.id === currentScenarioId);
    if (!scenario || currentStep >= scenario.steps.length - 1) {
      clearInterval(_autoInterval);
      _autoInterval = null;
      const b = document.getElementById('autoPlayBtn');
      if (b) b.textContent = '▶ 自动播放';
      return;
    }
    currentStep++;
    renderDetail();
  }, 1500);
}

function checkScenario(result) {
  checkResults[currentScenarioId] = result;
  saveState();
  renderScenarioList();
  renderDetail();
  // Auto advance to next unchecked
  const currentIdx = SCENARIOS.findIndex(s => s.id === currentScenarioId);
  for (let i = currentIdx + 1; i < SCENARIOS.length; i++) {
    if (!checkResults[SCENARIOS[i].id]) {
      selectScenario(SCENARIOS[i].id);
      return;
    }
  }
}

function saveNotes(text) {
  scenarioNotes[currentScenarioId] = text;
  saveState();
}

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'TEXTAREA') return;
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { e.preventDefault(); prevStep(); }
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { e.preventDefault(); nextStep(); }
  if (e.key === '1') checkScenario('pass');
  if (e.key === '2') checkScenario('fail');
  if (e.key === '3') checkScenario('skip');
  if (e.key === ' ') { e.preventDefault(); autoPlay(); }
});

// Init
renderScenarioList();
</script>
</body>
</html>
